version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshmind
      POSTGRES_USER: meshmind
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/meshmind
      SPRING_DATASOURCE_USERNAME: meshmind
      SPRING_DATASOURCE_PASSWORD: changeme
      JWT_SECRET: changeme-replace-in-production
    ports:
      - "8080:8080"

volumes:
  postgres_data:
