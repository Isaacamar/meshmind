version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshmind
      POSTGRES_USER: meshmind
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/meshmind
      SPRING_DATASOURCE_USERNAME: meshmind
      SPRING_DATASOURCE_PASSWORD: changeme
      JWT_SECRET: meshmind-dev-secret-key-minimum-32chars!
    ports:
      - "8080:8080"

  openclaw:
    build: ./openclaw
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_URL: http://host.docker.internal:11434
      MESHMIND_CLOUD: http://backend:8080
      SQLITE_PATH: /data/openclaw.db
    ports:
      - "8000:8000"
    volumes:
      - openclaw_data:/data
      - ./openclaw/app:/app/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - openclaw
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  openclaw_data:
