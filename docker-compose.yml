services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshmind
      POSTGRES_USER: meshmind
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshmind -d meshmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot backend ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/meshmind
      SPRING_DATASOURCE_USERNAME: meshmind
      SPRING_DATASOURCE_PASSWORD: changeme
      JWT_SECRET: changeme-replace-in-production
    ports:
      - "8080:8080"

  # ── OpenClaw FastAPI (local AI backend) ─────────────────────────────────────
  openclaw:
    build: ./openclaw
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      SQLITE_PATH: /data/openclaw.db
    ports:
      - "8000:8000"
    volumes:
      - openclaw_data:/data
      - ./openclaw/app:/app/app

  # ── React frontend ───────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - openclaw
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  openclaw_data:
